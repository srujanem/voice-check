<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - VoiceCheck</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="global.css?v=5">
    <style>
        .auth-container { max-width: 400px; margin: 80px auto; background: var(--bg-card); padding: 40px; border-radius: 16px; border: 1px solid var(--border-color); box-shadow: 0 20px 40px rgba(0,0,0,0.2); }
        .auth-header { text-align: center; margin-bottom: 30px; }
        .auth-header i { font-size: 40px; color: var(--accent-cyan); margin-bottom: 10px; }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 8px; color: var(--text-secondary); font-size: 14px; }
        .form-group input { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid var(--border-color); background: var(--bg-hover); color: var(--text-primary); font-family: inherit; }
        .form-group input:focus { outline: none; border-color: var(--accent-cyan); box-shadow: 0 0 0 2px rgba(6, 182, 212, 0.2); }
        .divider { text-align: center; margin: 20px 0; color: var(--text-secondary); font-size: 12px; text-transform: uppercase; letter-spacing: 1px; position: relative; }
        .divider::before, .divider::after { content: ""; position: absolute; top: 50%; width: 40%; height: 1px; background: var(--border-color); }
        .divider::before { left: 0; }
        .divider::after { right: 0; }
        .btn-google { width: 100%; display: flex; align-items: center; justify-content: center; gap: 10px; background: white; color: #333; border: 1px solid #ddd; padding: 10px; border-radius: 8px; cursor: pointer; font-weight: 500; font-family: inherit; transition: background 0.2s; }
        .btn-google:hover { background: #f9fafb; }
    </style>
</head>
<body>
    <div class="theme-toggle" id="themeToggle"><i class="fa-solid fa-sun"></i></div>
    
    <a href="index.html" class="btn-secondary" style="position: absolute; top: 20px; left: 20px;"><i class="fa-solid fa-arrow-left"></i> Back to Home</a>

    <div class="auth-container">
        <div class="auth-header">
            <i class="fa-solid fa-shield-halved"></i>
            <h2 style="margin: 0; font-size: 24px;">Welcome Back</h2>
            <p style="color: var(--text-secondary); font-size: 14px; margin-top: 5px;">Sign in to VoiceCheck Pro</p>
        </div>

        <button class="btn-google">
            <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="Google" style="width: 18px;">
            Continue with Google
        </button>

        <div class="divider">or</div>

        <div class="auth-tabs" style="display: flex; margin-bottom: 20px; border-bottom: 1px solid var(--border-color);">
            <button id="tab-login" class="tab-btn active" style="flex:1; padding:10px; background:transparent; border:none; color:var(--accent-cyan); border-bottom: 2px solid var(--accent-cyan); cursor:pointer;">Login</button>
            <button id="tab-register" class="tab-btn" style="flex:1; padding:10px; background:transparent; border:none; color:var(--text-secondary); cursor:pointer;">Register</button>
        </div>

        <form id="auth-form">
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" id="email" placeholder="you@example.com" required>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="password" placeholder="••••••••" required>
            </div>
            
            <div id="error-message" style="color: #ef4444; font-size: 13px; margin-bottom: 10px; display: none;"></div>

            <button type="submit" id="submit-btn" class="btn-primary" style="width: 100%; justify-content: center; padding: 12px; font-size: 16px;">Sign In</button>
        </form>
        
        <p style="text-align: center; margin-top: 20px; font-size: 14px; color: var(--text-secondary);">
            <a href="pricing.html" style="color: var(--accent-cyan); text-decoration: none; font-weight: 500;">View Enterprise Plans</a>
        </p>
    </div>

    <script src="theme.js"></script>
    <script>
        const tabLogin = document.getElementById('tab-login');
        const tabRegister = document.getElementById('tab-register');
        const form = document.getElementById('auth-form');
        const submitBtn = document.getElementById('submit-btn');
        const errorMsg = document.getElementById('error-message');
        
        let isLogin = true;

        tabLogin.onclick = () => {
            isLogin = true;
            tabLogin.style.color = 'var(--accent-cyan)';
            tabLogin.style.borderBottom = '2px solid var(--accent-cyan)';
            tabRegister.style.color = 'var(--text-secondary)';
            tabRegister.style.borderBottom = 'none';
            submitBtn.innerText = 'Sign In';
            errorMsg.style.display = 'none';
        };

        tabRegister.onclick = () => {
            isLogin = false;
            tabRegister.style.color = 'var(--accent-cyan)';
            tabRegister.style.borderBottom = '2px solid var(--accent-cyan)';
            tabLogin.style.color = 'var(--text-secondary)';
            tabLogin.style.borderBottom = 'none';
            submitBtn.innerText = 'Create Account';
            errorMsg.style.display = 'none';
        };

        form.onsubmit = async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const endpoint = isLogin ? 'http://127.0.0.1:5000/auth/login' : 'http://127.0.0.1:5000/auth/register';

            try {
                submitBtn.innerText = 'Loading...';
                const res = await fetch(endpoint, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });
                const data = await res.json();
                
                if (res.ok) {
                    localStorage.setItem('user_id', data.user_id);
                    localStorage.setItem('api_key', data.api_key);
                    window.location.href = 'dashboard-ui/index.html';
                } else {
                    errorMsg.innerText = data.error || 'An error occurred';
                    errorMsg.style.display = 'block';
                    submitBtn.innerText = isLogin ? 'Sign In' : 'Create Account';
                }
            } catch (err) {
                errorMsg.innerText = 'Cannot connect to server. Is the backend running?';
                errorMsg.style.display = 'block';
                submitBtn.innerText = isLogin ? 'Sign In' : 'Create Account';
            }
        };
    </script>
</body>
</html>
