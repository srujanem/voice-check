<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VoiceCheck Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../global.css?v=3">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        .dashboard-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-top: 30px;
        }
        .stat-card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            text-align: center;
        }
        .stat-card h3 {
            color: var(--text-secondary);
            font-size: 16px;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .stat-value {
            font-size: 36px;
            font-weight: 700;
            color: var(--accent-cyan);
        }
        .chart-container {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            margin-top: 20px;
            height: 350px;
        }
    </style>
</head>
<body>
    <div class="theme-toggle" id="themeToggle"><i class="fa-solid fa-sun"></i></div>
    
    <div class="app-container" style="max-width: 1000px;">
        <header class="app-header">
            <div class="logo-section">
                <i class="fa-solid fa-chart-pie app-logo" style="font-size: 32px; color: var(--accent-cyan);"></i>
                <div>
                    <h2>Pro Dashboard</h2>
                    <p style="font-size: 14px;">Analytics & Usage History</p>
                </div>
            </div>
            <a href="../index.html" class="btn-secondary">
                <i class="fa-solid fa-house"></i> Home
            </a>
        </header>

        <div class="dashboard-grid">
            <div class="stat-card">
                <h3>Total Scans</h3>
                <div class="stat-value" id="totalScans">0</div>
            </div>
            <div class="stat-card">
                <h3>AI Content Detected</h3>
                <div class="stat-value" id="aiDetected" style="color: var(--color-error);">0%</div>
            </div>
            <div class="stat-card">
                <h3>Most Used Tool</h3>
                <div class="stat-value" id="mostUsedTool" style="color: var(--color-success);">-</div>
            </div>
        </div>

        <div class="dashboard-grid">
            <div class="chart-container">
                <canvas id="typeChart"></canvas>
            </div>
            <div class="chart-container">
                <canvas id="resultChart"></canvas>
            </div>
        </div>

        <div class="chart-container" style="height: 400px; margin-bottom: 50px;">
            <canvas id="timelineChart"></canvas>
        </div>
    </div>

    <script src="../theme.js"></script>
    <script src="script.js"></script>
</body>
</html>
