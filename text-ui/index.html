<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Text AI Detector</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../global.css?v=3">
</head>
<body>
    <div class="theme-toggle" id="themeToggle"><i class="fa-solid fa-sun"></i></div>
    <div class="app-container">
        
        <header class="app-header">
            <div class="logo-section">
                <img src="../assets/text_logo.png" alt="Text Detector Logo" class="app-logo">
                <div>
                    <h2>Text Detector</h2>
                    <p style="font-size: 14px;">Identify ChatGPT & AI writing</p>
                </div>
            </div>
            <a href="../index.html" class="btn-secondary">
                <i class="fa-solid fa-house"></i> Home
            </a>
        </header>

        <div id="error-alert" class="hidden" style="background: var(--color-error); padding: 10px; border-radius: 8px; margin-bottom: 20px; color: white;">
            <i class="fa-solid fa-circle-exclamation"></i> <span id="error-message"></span>
        </div>

        <div id="input-section">
            <textarea id="textInput" placeholder="Paste your essay, article, or text here to check if it was written by AI..." style="width: 100%; height: 250px; padding: 20px; border-radius: 12px; border: 1px solid var(--border-color); background: var(--bg-card); color: var(--text-primary); font-family: 'Inter', sans-serif; font-size: 16px; resize: none; margin-bottom: 20px; box-sizing: border-box;"></textarea>
        </div>

        <button id="btnAnalyze" class="btn-primary" style="width: 100%; justify-content: center;">
            <i class="fa-solid fa-magnifying-glass"></i> Analyze Text
        </button>

        <div id="loading-state" class="hidden text-center" style="margin-top: 20px;">
            <i class="fa-solid fa-spinner fa-spin" style="font-size: 30px; color: var(--accent-cyan); margin-bottom: 10px;"></i>
            <p>Analyzing writing patterns...</p>
        </div>

        <div id="resultsSection" class="hidden">
            <div class="result-card" id="result-card">
                <div class="result-icon-container" id="result-icon-box">
                    <i class="fa-solid fa-file-signature" id="result-icon"></i>
                </div>
                <h3 class="result-title" id="classificationResult">Human Written</h3>
                
                <div class="confidence-ring">
                    <svg>
                        <circle cx="60" cy="60" r="54"></circle>
                        <circle class="progress" cx="60" cy="60" r="54" id="scoreProgress"></circle>
                    </svg>
                    <div class="confidence-text" id="scorePercentage">0%</div>
                </div>

                <div style="display: flex; justify-content: space-around; margin-top: 20px; padding-top: 20px; border-top: 1px solid var(--border-color);">
                    <span id="prob-human">Human: --</span>
                    <span id="prob-ai">AI: --</span>
                </div>
            </div>

            <button id="reset-btn" class="btn-secondary" style="width: 100%; margin-top: 20px; justify-content: center;">
                <i class="fa-solid fa-rotate-right"></i> Check New Text
            </button>
            <button id="download-btn" class="btn-secondary" style="width: 100%; margin-top: 10px; justify-content: center; background: var(--bg-hover);">
                <i class="fa-solid fa-file-pdf"></i> Download PDF Report
            </button>
        </div>

    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <script src="../theme.js"></script>
    <script src="../history.js"></script>
    <script src="script.js"></script>
</body>
</html>
