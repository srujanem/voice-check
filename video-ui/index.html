<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Deepfake Detector</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../global.css?v=3">
</head>
<body>
    <div class="theme-toggle" id="themeToggle"><i class="fa-solid fa-sun"></i></div>
    <div class="app-container">
        
        <header class="app-header">
            <div class="logo-section">
                <img src="../assets/video_logo.png" alt="Video Detector Logo" class="app-logo">
                <div>
                    <h2>Video Detector</h2>
                    <p style="font-size: 14px;">Analyze frames to spot deepfakes</p>
                </div>
            </div>
            <a href="../index.html" class="btn-secondary">
                <i class="fa-solid fa-house"></i> Home
            </a>
        </header>

        <div id="error-alert" class="hidden" style="background: var(--color-error); padding: 10px; border-radius: 8px; margin-bottom: 20px; color: white;">
            <i class="fa-solid fa-circle-exclamation"></i> <span id="error-message"></span>
        </div>

        <div id="input-section">
            <div id="upload-area" class="input-area active">
                <div class="upload-area" id="drop-zone" onclick="document.getElementById('fileInput').click()">
                    <i class="fa-solid fa-file-video upload-icon"></i>
                    <h3>Drag & Drop Video</h3>
                    <p>MP4, WEBM, or MOV</p>
                    <input type="file" id="fileInput" accept="video/*" hidden>
                </div>
            </div>

            <div id="videoPreviewContainer" class="hidden" style="text-align: center; margin-bottom: 20px; background: rgba(0,0,0,0.2); padding: 20px; border-radius: 12px; position: relative; overflow: hidden;">
                <video id="videoPreview" controls style="max-width: 100%; max-height: 300px; border-radius: 8px;"></video>
                <div class="scanner-line hidden" id="scannerLine" style="position: absolute; top:0; left:0; width:100%; height:2px; background: var(--accent-cyan); box-shadow: 0 0 10px 2px var(--accent-cyan); animation: scan 2s infinite ease-in-out;"></div>
                <button id="btnRemove" class="btn-secondary" style="margin-top: 10px; position: relative; z-index: 10;">Remove Video</button>
            </div>
        </div>

        <button id="btnAnalyze" class="btn-primary disabled" disabled>
            <i class="fa-solid fa-film"></i> Analyze Video
        </button>

        <div id="loading-state" class="hidden text-center" style="margin-top: 20px;">
            <i class="fa-solid fa-spinner fa-spin" style="font-size: 30px; color: var(--accent-cyan); margin-bottom: 10px;"></i>
            <p>Extracting and analyzing frames...</p>
        </div>

        <div id="resultsSection" class="hidden">
            <div class="result-card" id="result-card">
                <div class="result-icon-container" id="result-icon-box">
                    <i class="fa-solid fa-video" id="result-icon"></i>
                </div>
                <h3 class="result-title" id="classificationResult">Authentic Video</h3>
                
                <div class="confidence-ring">
                    <svg>
                        <circle cx="60" cy="60" r="54"></circle>
                        <circle class="progress" cx="60" cy="60" r="54" id="scoreProgress"></circle>
                    </svg>
                    <div class="confidence-text" id="scorePercentage">0%</div>
                </div>

                <div style="display: flex; justify-content: space-around; margin-top: 20px; padding-top: 20px; border-top: 1px solid var(--border-color);">
                    <span id="prob-real">Real: --</span>
                    <span id="prob-fake">Fake: --</span>
                </div>
            </div>

            <button id="reset-btn" class="btn-secondary" style="width: 100%; margin-top: 20px; justify-content: center;" onclick="document.getElementById('btnRemove').click()">
                <i class="fa-solid fa-rotate-right"></i> Analyze Another
            </button>
            <button id="download-btn" class="btn-secondary" style="width: 100%; margin-top: 10px; justify-content: center; background: var(--bg-hover);">
                <i class="fa-solid fa-file-pdf"></i> Download PDF Report
            </button>
        </div>

    </div>

    <style>
        @keyframes scan {
            0% { top: 0%; opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { top: 100%; opacity: 0; }
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <script src="../theme.js"></script>
    <script src="../history.js"></script>
    <script src="script.js"></script>
</body>
</html>
