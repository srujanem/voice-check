<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>URL Scanner - AuthGuard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../global.css?v=6">
</head>
<body>
    <div class="theme-toggle" id="themeToggle"><i class="fa-solid fa-sun"></i></div>
    <div class="app-container">
        
        <header class="app-header">
            <div class="logo-section">
                <img src="../assets/url_logo.png" alt="URL Scanner Logo" class="app-logo">
                <div>
                    <h2>URL Scanner</h2>
                    <p style="font-size: 14px;">Analyze web content directly</p>
                </div>
            </div>
            <a href="../index.html" class="btn-secondary">
                <i class="fa-solid fa-house"></i> Home
            </a>
        </header>

        <div id="error-alert" class="hidden" style="background: var(--color-error); padding: 10px; border-radius: 8px; margin-bottom: 20px; color: white;">
            <i class="fa-solid fa-circle-exclamation"></i> <span id="error-message"></span>
        </div>

        <div id="input-section">
            <div class="input-area active" style="padding: 30px;">
                <h3 style="margin-top: 0;"><i class="fa-solid fa-link"></i> Scan External Link</h3>
                <p style="color: var(--text-secondary); margin-bottom: 20px;">Paste a news article or blog URL below to extract and scan its text.</p>
                <input type="url" id="urlInput" placeholder="https://..." style="width: 100%; padding: 15px; border-radius: 8px; border: 1px solid var(--border-color); background: var(--bg-hover); color: var(--text-primary); font-family: inherit; font-size: 16px;">
            </div>
        </div>

        <button id="btnAnalyze" class="btn-primary" style="margin-top: 20px;">
            <i class="fa-solid fa-satellite-dish"></i> Scan Link
        </button>

        <div id="loading-state" class="hidden text-center" style="margin-top: 20px;">
            <i class="fa-solid fa-spinner fa-spin" style="font-size: 30px; color: var(--accent-cyan); margin-bottom: 10px;"></i>
            <p>Scraping and analyzing content...</p>
        </div>

        <div id="resultsSection" class="hidden">
            <div class="result-card" id="result-card">
                <div class="result-icon-container" id="result-icon-box">
                    <i class="fa-solid fa-globe" id="result-icon"></i>
                </div>
                <h3 class="result-title" id="classificationResult">Authentic Content</h3>
                
                <div class="confidence-ring">
                    <svg>
                        <circle cx="60" cy="60" r="54"></circle>
                        <circle class="progress" cx="60" cy="60" r="54" id="scoreProgress"></circle>
                    </svg>
                    <div class="confidence-text" id="scorePercentage">0%</div>
                </div>

                <div style="display: flex; justify-content: space-around; margin-top: 20px; padding-top: 20px; border-top: 1px solid var(--border-color);">
                    <span id="prob-human">Human: --</span>
                    <span id="prob-ai">AI: --</span>
                </div>
                
                <div id="preview-section" style="margin-top: 20px; padding: 15px; background: rgba(0,0,0,0.1); border-radius: 8px; text-align: left; font-size: 13px; line-height: 1.5; color: var(--text-secondary); font-style: italic;">
                    <!-- Preview text -->
                </div>
            </div>

            <button id="reset-btn" class="btn-secondary" style="width: 100%; margin-top: 20px; justify-content: center;">
                <i class="fa-solid fa-rotate-right"></i> Scan Another URL
            </button>
            <button id="download-btn" class="btn-secondary" style="width: 100%; margin-top: 10px; justify-content: center; background: var(--bg-hover);">
                <i class="fa-solid fa-file-pdf"></i> Download PDF Report
            </button>
        </div>

    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <script src="../theme.js"></script>
    <script src="../history.js"></script>
    <script src="script.js"></script>
</body>
</html>
